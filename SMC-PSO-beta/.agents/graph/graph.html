<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>SMC-PSO-beta — knowledge graph</title>
<style>
  body { margin:0; background:#0b0f1a; color:#cdd6f4; font:14px/1.4 system-ui, sans-serif; }
  header { padding:12px 16px; border-bottom:1px solid #1e2536; }
  header b { color:#89b4fa; }
  #canvas { width:100vw; height:calc(100vh - 52px); display:block; }
  .hint { color:#6c7086; font-size:12px; }
</style></head>
<body>
<header><b>SMC-PSO-beta</b> knowledge graph
  <span class="hint">— 17 nodes, 20 edges · drag to pan · scroll to zoom</span>
</header>
<canvas id="canvas"></canvas>
<script>
const NODES = [{"id": "cli", "kind": "entrypoint", "path": "simulate.py", "desc": "Command-line interface"}, {"id": "web", "kind": "entrypoint", "path": "streamlit_app.py", "desc": "Streamlit dashboard"}, {"id": "config", "kind": "config", "path": "config.yaml", "desc": "YAML-validated configuration"}, {"id": "factory", "kind": "module", "path": "src/controllers/factory.py", "desc": "Type-safe controller factory"}, {"id": "smc_classical", "kind": "controller", "path": "src/controllers/smc/classical", "desc": "Classical SMC (boundary layer)"}, {"id": "smc_sta", "kind": "controller", "path": "src/controllers/smc/sta", "desc": "Super-twisting SMC"}, {"id": "smc_adaptive", "kind": "controller", "path": "src/controllers/smc/adaptive", "desc": "Adaptive SMC (online tuning)"}, {"id": "smc_hybrid", "kind": "controller", "path": "src/controllers/smc/hybrid", "desc": "Hybrid adaptive-STA SMC"}, {"id": "plant_models", "kind": "module", "path": "src/plant/models", "desc": "DIP dynamics: simplified / full nonlinear / low-rank"}, {"id": "runner", "kind": "module", "path": "src/core/simulation_runner.py", "desc": "Simulation orchestration"}, {"id": "vector_sim", "kind": "module", "path": "src/core/vector_sim.py", "desc": "Batch / Numba-accelerated sim"}, {"id": "safety_guards", "kind": "module", "path": "src/core/safety_guards.py", "desc": "Constraint monitoring"}, {"id": "pso", "kind": "module", "path": "src/optimization/algorithms", "desc": "PSO gain tuner"}, {"id": "cost", "kind": "module", "path": "src/optimization/objectives", "desc": "Multi-objective cost functions"}, {"id": "analysis", "kind": "module", "path": "src/analysis", "desc": "FDI, validation, statistics, visualization"}, {"id": "hil", "kind": "module", "path": "src/interfaces/hil", "desc": "Hardware-in-the-loop interface"}, {"id": "utils", "kind": "module", "path": "src/utils", "desc": "Validation, reproducibility (seeds), types"}];
const EDGES = [{"from": "cli", "to": "factory", "rel": "creates"}, {"from": "web", "to": "factory", "rel": "creates"}, {"from": "config", "to": "factory", "rel": "configures"}, {"from": "factory", "to": "smc_classical", "rel": "instantiates"}, {"from": "factory", "to": "smc_sta", "rel": "instantiates"}, {"from": "factory", "to": "smc_adaptive", "rel": "instantiates"}, {"from": "factory", "to": "smc_hybrid", "rel": "instantiates"}, {"from": "smc_classical", "to": "runner", "rel": "runs_in"}, {"from": "smc_sta", "to": "runner", "rel": "runs_in"}, {"from": "smc_adaptive", "to": "runner", "rel": "runs_in"}, {"from": "smc_hybrid", "to": "runner", "rel": "runs_in"}, {"from": "runner", "to": "plant_models", "rel": "simulates"}, {"from": "runner", "to": "vector_sim", "rel": "uses"}, {"from": "runner", "to": "safety_guards", "rel": "uses"}, {"from": "factory", "to": "pso", "rel": "tuned_by"}, {"from": "pso", "to": "cost", "rel": "evaluates"}, {"from": "pso", "to": "runner", "rel": "drives"}, {"from": "runner", "to": "analysis", "rel": "feeds"}, {"from": "runner", "to": "hil", "rel": "optional"}, {"from": "runner", "to": "utils", "rel": "uses"}];
const cv = document.getElementById('canvas');
const ctx = cv.getContext('2d');
function resize() { cv.width = innerWidth; cv.height = innerHeight - 52; }
resize(); addEventListener('resize', () => { resize(); layout(); draw(); });
const idx = {}; NODES.forEach((n, i) => idx[n.id] = i);
function layout() {
  const R = Math.min(cv.width, cv.height) * 0.36;
  NODES.forEach((n, i) => {
    const a = (i / NODES.length) * Math.PI * 2;
    n._x = Math.cos(a) * R; n._y = Math.sin(a) * R;
  });
}
let zoom = 1, panx = 0, pany = 0, drag = null;
cv.addEventListener('mousedown', e => drag = { x: e.clientX, y: e.clientY, px: panx, py: pany });
addEventListener('mouseup', () => drag = null);
addEventListener('mousemove', e => {
  if (!drag) return;
  panx = drag.px + (e.clientX - drag.x);
  pany = drag.py + (e.clientY - drag.y);
  draw();
});
cv.addEventListener('wheel', e => {
  e.preventDefault();
  zoom *= e.deltaY < 0 ? 1.1 : 0.9;
  zoom = Math.max(0.3, Math.min(4, zoom));
  draw();
}, { passive: false });
function pos(n) {
  return [cv.width / 2 + panx + n._x * zoom, cv.height / 2 + pany + n._y * zoom];
}
function draw() {
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.strokeStyle = '#313244'; ctx.lineWidth = 1; ctx.font = '12px system-ui';
  EDGES.forEach(e => {
    const a = NODES[idx[e.from]], b = NODES[idx[e.to]];
    if (!a || !b) return;
    const pa = pos(a), pb = pos(b);
    ctx.beginPath(); ctx.moveTo(pa[0], pa[1]); ctx.lineTo(pb[0], pb[1]); ctx.stroke();
    if (e.rel) { ctx.fillStyle = '#6c7086'; ctx.fillText(e.rel, (pa[0] + pb[0]) / 2, (pa[1] + pb[1]) / 2); }
  });
  NODES.forEach(n => {
    const p = pos(n);
    ctx.beginPath(); ctx.arc(p[0], p[1], 6, 0, Math.PI * 2);
    ctx.fillStyle = '#89b4fa'; ctx.fill();
    ctx.fillStyle = '#cdd6f4'; ctx.fillText(n.id, p[0] + 9, p[1] + 4);
  });
}
layout(); draw();
</script>
</body></html>
